[pytest]
DJANGO_SETTINGS_MODULE = itrix.settings.development
python_files = test_*.py tests.py *_tests.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    -ra
    --strict-markers
    --tb=short
    --reuse-db
markers =
    slow: marks tests as slow
    integration: marks tests that hit external services

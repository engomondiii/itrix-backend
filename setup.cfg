# ─────────────────────────────────────────────────────────────────────────────
# Lint / format configuration for the itriX backend.
# ─────────────────────────────────────────────────────────────────────────────

[flake8]
max-line-length = 100
extend-ignore = E203, W503, E501
exclude =
    .git,
    __pycache__,
    */migrations/*,
    venv,
    .venv,
    staticfiles,
    media

[isort]
profile = black
line_length = 100
known_first_party = apps,api,itrix,tasks,storage,tests
skip = migrations,venv,.venv,staticfiles

[tool:pytest]
DJANGO_SETTINGS_MODULE = itrix.settings.development
